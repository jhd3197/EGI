name: android

# Android mesh app CI (plan-16 Phase 8). The module lives in mobile/android
# (Gradle 8.14, AGP 8.5.0, JDK 17, compileSdk 35). Two jobs: fast JVM unit
# tests on every push/PR, and slower instrumented (emulator) tests that boot a
# real AVD via KVM. Triggers match the other workflows (tests.yml /
# security.yml): every push and pull request, no path filter.
on: [push, pull_request]

permissions:
  contents: read

jobs:
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/android
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        # AGP needs the SDK present to configure the project (compileSdk 35),
        # even for the JVM-only `test` task. Pulled in explicitly to be safe.
        uses: android-actions/setup-android@v3
      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run JVM unit tests
        run: ./gradlew test

  instrumented-tests:
    name: Instrumented (emulator) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/android
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      # Enable KVM so the hardware-accelerated emulator can boot on the runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        working-directory: .
      # Cache the AVD snapshot so subsequent runs skip the cold boot.
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30
      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load
          disable-animations: false
          working-directory: mobile/android
          script: echo "Generated AVD snapshot for caching."
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: mobile/android
          script: ./gradlew connectedCheck
