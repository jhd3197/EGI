name: android

# Android mesh app CI (plan-16 Phase 8). The module lives in mobile/android
# (Gradle 8.14, AGP 8.5.0, JDK 17, compileSdk 35). Two jobs: fast JVM unit
# tests on every push/PR to dev/main, and slower instrumented (emulator) tests
# that only run on the main branch path (PR to main or push to main) so dev
# integration stays light.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/android
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Set up Android SDK
        # AGP needs the SDK present to configure the project (compileSdk 35),
        # even for the JVM-only `test` task. Pulled in explicitly to be safe.
        uses: android-actions/setup-android@v3
      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run JVM unit tests
        run: ./gradlew test

  instrumented-tests:
    name: Instrumented (emulator) tests
    # Only gate the release path; dev integration uses the faster JVM tests.
    if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/android
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      # Enable KVM so the hardware-accelerated emulator can boot on the runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        working-directory: .
      # Cache the AVD snapshot so subsequent runs skip the cold boot.
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-v2
      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load
          disable-animations: false
          working-directory: mobile/android
          script: echo "Generated AVD snapshot for caching."
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: mobile/android
          script: |
            # The cached AVD may contain an older signed build. Uninstall first so
            # Gradle's APK installer never hits INSTALL_FAILED_UPDATE_INCOMPATIBLE.
            adb shell pm uninstall com.egi.app || true
            ./gradlew connectedCheck
