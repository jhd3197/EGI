# Pre-commit hooks (plan-15 Phase 6). Install once:
#   pip install pre-commit && pre-commit install
# Run on all files:
#   pre-commit run --all-files
#
# The secrets scan blocks a commit that contains a likely credential. To
# (knowingly) allow a false positive, add it to .gitleaksignore or annotate the
# line with `gitleaks:allow`.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: Python static security analysis
        args: ["-c", "bandit.yaml", "-lll"]
        files: ^server/(?!tests/).*\.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
